<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>papago | 번역기</title>
    <link rel="stylesheet" href="css/translate.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="#" class="logo-link">
                <i class="fas fa-dove"></i> papago <small>사전</small>
            </a>
            <div id="progress-text" style="font-size: 0.85rem; color: #999; margin-left: 20px; font-weight: 500; letter-spacing: 0.5px;">1 / 17</div>
        </div>
        <div class="header-right">
            <button class="header-btn plus">papago+</button>
            <button class="header-btn">플러스 소개</button>
            <i class="far fa-star"></i>
            <i class="fas fa-user-circle"></i>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tab active"><i class="fas fa-font"></i> 텍스트</div>
        <div class="tab"><i class="far fa-image"></i> 이미지</div>
        <div class="tab"><i class="far fa-file-alt"></i> 문서</div>
        <div class="tab"><i class="fas fa-globe"></i> 웹사이트</div>
    </div>

    <main class="main-content">
        <div class="translate-container">
            <!-- Source Box -->
            <div class="box source">
                <div class="box-header">
                    <div class="lang-dropdown">언어감지 <i class="fas fa-chevron-down"></i></div>
                    <div class="swap-arrows"><i class="fas fa-exchange-alt"></i></div>
                </div>
                <div id="source-text" class="text-box">화덕 피자는 나에게 가장 큰 위안을 주는 음식 중 하나이다.</div>
                <div class="char-count" id="char-count">0 / 3000</div>
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button class="toolbar-btn" onclick="speak('ko-KR')"><i class="fas fa-volume-up"></i></button>
                        <button class="toolbar-btn" onclick="copyText('source-text')"><i class="far fa-paste"></i></button>
                    </div>
                    <button class="translate-submit-btn" onclick="nextSentence()">번역하기</button>
                </div>
            </div>

            <!-- Target Box -->
            <div class="box target">
                <div class="box-header">
                    <div class="lang-dropdown">한국어 <i class="fas fa-chevron-down"></i></div>
                </div>
                <div id="target-text" class="text-box" style="color:#00c73c;">Eating warm oven-baked pizza...</div>
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button class="toolbar-btn" onclick="speak('en-US')"><i class="fas fa-volume-up"></i></button>
                        <button class="toolbar-btn" onclick="copyText('target-text')"><i class="far fa-paste"></i></button>
                        <button class="toolbar-btn"><i class="far fa-star"></i></button>
                        <button class="toolbar-btn"><i class="fas fa-share-alt"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast">복사되었습니다.</div>

    <script>
        const sentences = [
            // ... (keep original sentences)
            { ko: "[음식 소개]", en: "[Food Introduction]", type: "title" },
            { ko: "화덕 피자는 나에게 가장 큰 위안을 주는 음식 중 하나이다.", en: "Eating warm oven-baked pizza with my family is one of the best ways for me to relax after a long day.", type: "text" },
            { ko: "나는 어느 날 저녁 가족과 함께 따뜻한 화덕 피자를 나누어 먹었던 시간을 아직도 기억한다.", en: "I still remember an ordinary evening when we sat together and shared a warm pizza at home.", type: "text" },
            { ko: "그날은 특별한 날은 아니었지만, 모두가 집에 모여 함께 식사할 수 있어서 더 따뜻하게 느껴졌다.", en: "It was not a special day, but it was the kind of memory to stay in my heart for a long time.", type: "text" },
            { ko: "상자를 열었을 때 퍼지던 도우 냄새와 치즈 향은 하루의 피곤함을 잊게 해 주었다.", en: "The smell of fresh dough and melted cheese made us forget the tiredness of the day.", type: "text" },
            { ko: "아버지는 우리가 아직 따뜻할 때 같이 먹을 수 있도록 피자를 작은 조각으로 잘라주셨다.", en: "My father cut the pizza into small pieces so that we could eat it together while it was still hot.", type: "text" },
            { ko: "나에게 따뜻한 화덕 피자를 먹는 것은 스트레스를 해소하고 마음을 편안하게 만드는 좋은 방법이다.", en: "For me, warm oven-baked pizza always makes me feel calm and peaceful.", type: "text" },
            { ko: "그래서 화덕 피자는 나에게 단순한 음식이 아니라, 행복했던 순간을 다시 떠올리게 하는 특별한 위안의 음식이다.", en: "That is why oven-baked pizza is not just food to me, but a special comfort food that brings back happy moments.", type: "text" },
            { ko: "[레시피]", en: "[Recipe]", type: "title" },
            { ko: "집에서 화덕 피자를 만들면 그 따뜻한 기억을 다시 떠올릴 수 있다.", en: "Making oven-baked pizza at home is easier than many people think.", type: "text" },
            { ko: "먼저 피자 도우, 토마토소스, 모차렐라 치즈, 양파, 버섯, 햄, 그리고 피자를 구울 트레이를 준비한다.", en: "First, prepare pizza dough, tomato sauce, mozzarella cheese, onions, mushrooms, ham, and a tray to bake the pizza on.", type: "text" },
            { ko: "오븐에 넣을 팬 위에 도우를 올리고, 토마토소스를 고르게 펴 바른다.", en: "Place the dough on the tray and spread the sauce evenly over it.", type: "text" },
            { ko: "그다음 치즈와 토핑을 고르게 올린다.", en: "Then add the cheese and toppings in a neat layer.", type: "text" },
            { ko: "가장자리가 노릇해지고 치즈가 잘 녹을 수 있도록 높은 온도에서 약 10분 정도 굽는다.", en: "Bake it at a high temperature for about ten minutes so that it can turn golden and the cheese can melt well.", type: "text" },
            { ko: "오븐에서 퍼지는 고소한 냄새는 가족들이 자연스럽게 부엌으로 오게 만든다.", en: "The warm smell from the oven will make your family come into the kitchen.", type: "text" },
            { ko: "완성된 피자를 바로 내는 것은 나를 항상 따뜻하고 편안하게 만든다.", en: "Serving the pizza right away always makes me feel warm and relaxed.", type: "text" },
            { ko: "이것은 사랑하는 사람들과 나누기 좋은 간단한 레시피이다.", en: "It is also a simple recipe to share with the people you love.", type: "text" }
        ];

        let currentIndex = 0;

        function updateUI() {
            const source = document.getElementById('source-text');
            const target = document.getElementById('target-text');
            const progress = document.getElementById('progress-text');
            const charCount = document.getElementById('char-count');

            const item = sentences[currentIndex];
            source.innerText = item.ko;
            target.innerText = item.en;
            progress.innerText = `${currentIndex + 1} / ${sentences.length}`;
            charCount.innerText = `${item.ko.length} / 3000`;

            // Transition effect
            source.style.opacity = '0.5';
            target.style.opacity = '0.5';
            setTimeout(() => {
                source.style.opacity = '1';
                target.style.opacity = '1';
            }, 100);
        }

        function nextSentence() {
            if (currentIndex < sentences.length - 1) {
                currentIndex++;
                updateUI();
            }
        }

        function prevSentence() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function speak(lang) {
            window.speechSynthesis.cancel();
            const text = (lang === 'ko-KR') ? sentences[currentIndex].ko : sentences[currentIndex].en;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            window.speechSynthesis.speak(utterance);
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // Keyboard support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextSentence();
            if (e.key === 'ArrowLeft') prevSentence();
        });

        updateUI();
    </script>
</body>
</html>

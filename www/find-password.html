<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 찾기 - EduBoard</title>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="js/password-utils.js"></script>
  <link rel="stylesheet" href="css/find-password.css">
</head>

<body>
  <header>
    <h1>EduBoard</h1>
  </header>

  <main class="container">
    <h2>비밀번호 찾기</h2>
    <input type="text" id="username" placeholder="아이디를 입력하세요" />
    <input type="text" id="name" placeholder="이름을 입력하세요" />
    <input type="email" id="email" placeholder="이메일을 입력하세요" />
    
    <button id="sendCodeBtn">인증번호 발매</button>

    <div id="verify-area" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
      <input type="text" id="verifyCode" placeholder="인증번호 6자리" />
      <button id="verifyBtn">인증번호 확인</button>
    </div>

    <div id="reset-area" style="display:none; margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
      <input type="password" id="newPassword" placeholder="새 비밀번호 (6자 이상)" />
      <input type="password" id="confirmPassword" placeholder="새 비밀번호 확인" />
      <button id="resetBtn">비밀번호 변경 완료</button>
    </div>

    <div id="result"></div>
    <div class="back-link">
      <a href="index.html">← 로그인으로 돌아가기</a>
    </div>
  </main>

  <script src="js/find-password.js"></script>
</body>

</html>

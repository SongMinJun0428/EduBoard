﻿/* ==========================================================================
   CSS Variables & Theming
   ========================================================================== */
:root {
    /* Color Palette - Vibrant gradients and sleek modern UI */
    --primary-hue: 250;
    --primary-color: hsl(var(--primary-hue), 85%, 60%);
    --primary-color-hover: hsl(var(--primary-hue), 85%, 50%);
    --secondary-color: hsl(300, 85%, 60%);
    --accent-color: hsl(180, 85%, 50%);
    
    /* Backgrounds & Glassmorphism */
    --bg-page: hsl(230, 20%, 96%);
    --bg-glass: rgba(255, 255, 255, 0.7);
    --bg-glass-card: rgba(255, 255, 255, 0.4);
    --border-glass: rgba(255, 255, 255, 0.4);
    --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
    
    /* Text Colors */
    --text-main: hsl(230, 30%, 15%);
    --text-muted: hsl(230, 15%, 45%);
    --text-inverse: #ffffff;
    
    /* System Colors */
    --success: hsl(150, 70%, 45%);
    --warning: hsl(40, 90%, 55%);
    --danger: hsl(350, 80%, 55%);
    
    /* Typography */
    --font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    
    /* Spacing & Sizes */
    --border-radius-lg: 24px;
    --border-radius-md: 16px;
    --border-radius-sm: 8px;
    
    --transition-fast: 0.2s ease;
    --transition-normal: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* Dark Theme Support (Auto or Togglable) */
.theme-dark {
    --bg-page: hsl(230, 25%, 10%);
    --bg-glass: rgba(15, 20, 35, 0.65);
    --bg-glass-card: rgba(25, 30, 50, 0.5);
    --border-glass: rgba(255, 255, 255, 0.08);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    --text-main: hsl(230, 20%, 95%);
    --text-muted: hsl(230, 15%, 70%);
}

/* ==========================================================================
   Base Styles
   ========================================================================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: var(--font-family);
    background-color: var(--bg-page);
    color: var(--text-main);
    line-height: 1.6;
    height: 100vh;
    overflow: hidden;
    transition: background-color var(--transition-normal);
}

h1, h2, h3, h4, h5, h6 {
    line-height: 1.3;
    font-weight: 700;
}

button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    outline: none;
}

a {
    color: var(--primary-color);
    text-decoration: none;
}

/* ==========================================================================
   Layout Containers & Glassmorphism
   ========================================================================== */
.app-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Changed from center to prevent top clipping when overflowing */
    padding: 20px;
    z-index: 1;
    overflow: hidden; /* Lock viewport from scrolling */
}

/* Background Gradients */
.bg-blur {
    position: absolute;
    filter: blur(80px);
    z-index: -1;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 15s ease-in-out infinite;
}

.bg-blur-1 {
    top: -10%;
    left: -10%;
    width: 50vw;
    height: 50vw;
    background: radial-gradient(circle, var(--primary-color), transparent 70%);
    animation-delay: 0s;
}

.bg-blur-2 {
    bottom: -10%;
    right: -10%;
    width: 60vw;
    height: 60vw;
    background: radial-gradient(circle, var(--secondary-color), transparent 70%);
    animation-delay: -5s;
}

.bg-blur-3 {
    top: 40%;
    left: 40%;
    width: 40vw;
    height: 40vw;
    background: radial-gradient(circle, var(--accent-color), transparent 70%);
    opacity: 0.4;
    animation-delay: -10s;
}

/* Glass Main Panel */
.glass-panel {
    background: var(--bg-glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border-glass);
    border-radius: var(--border-radius-lg);
    box-shadow: var(--glass-shadow);
    width: 100%;
    max-width: 800px;
    height: 100%;
    max-height: 85vh;
    margin: auto; /* Centering replacement for align-items: center */
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none; /* Hide scrollbar Firefox */
    -ms-overflow-style: none;  /* Hide scrollbar IE and Edge */
    position: relative;
}

.glass-panel::-webkit-scrollbar {
    display: none; /* Hide scrollbar for Chrome, Safari and Opera */
}

/* ==========================================================================
   UI Components
   ========================================================================== */
/* Buttons */
.btn {
    padding: 14px 28px;
    border-radius: var(--border-radius-sm);
    font-size: 1.1rem;
    font-weight: 600;
    transition: all var(--transition-fast);
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: var(--text-inverse);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(100, 50, 255, 0.3);
}

.btn-primary:active {
    transform: translateY(1px);
}

.btn-secondary {
    background: var(--bg-glass-card);
    border: 1px solid var(--border-glass);
    color: var(--text-main);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.8);
    border-color: var(--primary-color);
}
.theme-dark .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
}

/* Loader */
.loader {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
    flex: 1;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 4px solid var(--border-glass);
    border-top-color: var(--primary-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

@keyframes spin { 100% { transform: rotate(360deg); } }
@keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-5px) scale(1.02); }
}

/* Scrollbar */
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
}
.theme-dark ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
}
/* ==========================================================================
   Micro-Animations and Transitions
   ========================================================================== */

/* Fade Ins */
.fade-in {
    animation: fadeIn 0.4s ease-out forwards;
}

.fade-in-up {
    animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.fade-in-right {
    animation: fadeInRight 0.4s ease-out forwards;
}

/* Staggered Delay Helpers */
.delay-100 { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 100ms forwards; opacity: 0; }
.delay-200 { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 200ms forwards; opacity: 0; }
.delay-300 { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 300ms forwards; opacity: 0; }
.delay-400 { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 400ms forwards; opacity: 0; }

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes fadeInUp {
    from { 
        opacity: 0; 
        transform: translateY(20px); 
    }
    to { 
        opacity: 1; 
        transform: translateY(0); 
    }
}

@keyframes fadeInRight {
    from { 
        opacity: 0; 
        transform: translateX(30px); 
    }
    to { 
        opacity: 1; 
        transform: translateX(0); 
    }
}

/* Hover scales for cards */
.hover-scale {
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.hover-scale:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* Progress bar animation */
@keyframes progressFill {
    from { width: 0; }
}

.progress-bar-fill {
    transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

/* View Transition Helper: hidden views */
.view {
    display: none;
    width: 100%;
    flex-direction: column;
    flex: 1;
}

.view.active {
    display: flex;
}

class AppState {
    constructor() {
        this.reset();
    }

    reset() {
        this.user = {
            name: "",
            grade: "",
            modeDetail: "short",
            modeGroup: "solo",
            apiKey: "",
            apiProvider: "gemini"
        };
        
        // answers will store: { questionId: { selectedOption: 'A', reason: '...' } }
        this.answers = {};
        
        // tagCounts will store: { "蹂댁긽": 3, "?깆옣": 5, ... }
        this.tagCounts = {};

        this.currentCategoryIndex = 0;
        this.currentQuestionIndex = 0;
        
        // Pre-compute category ranges for easy navigation
        this.categoryQuestions = {};
        CATEGORIES.forEach(cat => {
            this.categoryQuestions[cat.id] = QUESTIONS.filter(q => q.category === cat.id);
        });
    }

    setUserForm(name, grade, modeDetail, modeGroup, apiKey, apiProvider) {
        this.user.name = name;
        this.user.grade = grade;
        this.user.modeDetail = modeDetail;
        this.user.modeGroup = modeGroup;
        this.user.apiKey = apiKey;
        this.user.apiProvider = apiProvider;
    }

    getCurrentCategory() {
        return CATEGORIES[this.currentCategoryIndex] || null;
    }

    getCurrentQuestion() {
        const cat = this.getCurrentCategory();
        if (!cat) return null;
        return this.categoryQuestions[cat.id][this.currentQuestionIndex];
    }

    getCurrentCategoryProgress() {
        const cat = this.getCurrentCategory();
        if (!cat) return { current: 0, total: 1 };
        return {
            current: this.currentQuestionIndex + 1,
            total: this.categoryQuestions[cat.id].length
        };
    }

    saveAnswer(questionId, selectedOption, tags, reason) {
        this.answers[questionId] = { selectedOption, tags, reason };
        
        // Accumulate tags
        tags.forEach(tag => {
            this.tagCounts[tag] = (this.tagCounts[tag] || 0) + 1;
        });
    }

    nextStep() {
        // Returns "question_next", "category_summary", or "finished"
        const cat = this.getCurrentCategory();
        const maxQ = this.categoryQuestions[cat.id].length;
        
        if (this.currentQuestionIndex < maxQ - 1) {
            this.currentQuestionIndex++;
            return "question_next";
        } else {
            // Reached end of category
            if (this.currentCategoryIndex < CATEGORIES.length - 1) {
                return "category_summary";
            } else {
                return "finished";
            }
        }
    }

    nextCategory() {
        this.currentCategoryIndex++;
        this.currentQuestionIndex = 0;
    }

    // Advanced tag retrieval
    getTopTagsForCategory(categoryId, limit = 3) {
        const qList = this.categoryQuestions[categoryId];
        let catTags = {};
        qList.forEach(q => {
            const ans = this.answers[q.id];
            if (ans && ans.tags) {
                ans.tags.forEach(t => {
                    catTags[t] = (catTags[t] || 0) + 1;
                });
            }
        });

        return Object.entries(catTags)
            .sort((a, b) => b[1] - a[1])
            .slice(0, limit)
            .map(e => e[0]);
    }

    getAllTopTags(limit = 3) {
        return Object.entries(this.tagCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, limit)
            .map(e => e[0]);
    }
    seedTestData() {
        this.answers = {};
        this.tagCounts = {};
        
        QUESTIONS.forEach(q => {
            const options = ['A', 'B'];
            const selected = options[Math.floor(Math.random() * options.length)];
            const tags = selected === 'A' ? q.tagsA : q.tagsB;
            const chosenText = selected === 'A' ? q.optionA : q.optionB;
            
            this.saveAnswer(q.id, selected, tags, `?뚯뒪?? ${chosenText} ?깊뼢?????媛移섍?怨?????留욌뒗?ㅺ퀬 ?앷컖?⑸땲??`);
        });

        this.currentCategoryIndex = CATEGORIES.length - 1;
        this.currentQuestionIndex = this.categoryQuestions[CATEGORIES[this.currentCategoryIndex].id].length - 1;
    }
}

class AppController {
    
    start() {
        UI.renderStartScreen(() => this.showConfig());
    }

    showConfig() {
        UI.renderConfigScreen((name, grade, detail, group, api, provider) => {
            state.setUserForm(name, grade, detail, group, api, provider);
            if (grade === '?뚯뒪??) {
                state.seedTestData();
                this.showFinalResult();
            } else {
                this.showCategoryIntro();
            }
        });
    }

    showCategoryIntro() {
        UI.renderCategoryScreen(CATEGORIES, state.currentCategoryIndex, () => {
            this.showQuestion();
        });
    }

    showQuestion() {
        const cat = state.getCurrentCategory();
        const q = state.getCurrentQuestion();
        const progress = state.getCurrentCategoryProgress();

        UI.renderQuestionScreen(cat, q, progress, (selectedOption, tags, reason) => {
            // Save answered data
            state.saveAnswer(q.id, selectedOption, tags, reason);
            
            // Determine next step
            const nextAction = state.nextStep();
            
            if (nextAction === "question_next") {
                this.showQuestion();
            } else if (nextAction === "category_summary") {
                this.showIntermediateSummary();
            } else if (nextAction === "finished") {
                this.showFinalResult();
            }
        });
    }

    showIntermediateSummary() {
        const cat = state.getCurrentCategory();
        const topTags = state.getTopTagsForCategory(cat.id, 2);
        
        UI.renderIntermediateSummary(cat, topTags, () => {
            state.nextCategory();
            this.showCategoryIntro();
        });
    }

    async showFinalResult() {
        UI.renderAnalyzingScreen();
        try {
            // Get base results (tags, type, etc.)
            const finalResult = await Analyzer.compileFinalResultAsync(state);
            
            UI.renderFinalResult(finalResult, state.user, 
                () => { // onRestart
                    state.reset();
                    this.start();
                },
                async (container) => { // onDeepAnalyze (Click handler)
                    try {
                        const sentences = await Analyzer.generateRealAISentences(state, finalResult.mainType);
                        container.innerHTML = sentences.join('<br><br>');
                    } catch(err) {
                        console.error(err);
                        container.innerHTML = `
                            <div style="padding: 20px; color: #d32f2f; background: #ffebee; border-radius: 8px;">
                                ?좑툘 AI 遺꾩꽍 以??ㅻ쪟媛 諛쒖깮?덉뒿?덈떎.<br>

                            </div>
                        `;
                    }
                }
            );

            console.error(e);
            alert('寃곌낵 ?붾㈃???섎┰?섎뒗 以??ㅻ쪟媛 諛쒖깮?덉뒿?덈떎.');
        }
    }
}

    const app = new AppController();

};

} else {
